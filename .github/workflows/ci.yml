name: JobGuard CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run smoke tests
        run: PYTHONPATH=. pytest -q tests/test_notebook_smoke.py tests/test_deploy_workflow.py tests/test_api_smoke.py tests/test_pipeline_smoke.py
