name: Build & Deploy JobGuard AI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate project structure
        run: |
          echo "✓ Checking index.html exists..."
          test -f index.html && echo "  ✓ index.html found" || exit 1
          
          echo "✓ Checking notebook exists..."
          test -f jobguard-classifier.ipynb && echo "  ✓ Notebook found" || exit 1

      - name: Validate HTML syntax
        run: |
          python -c "
          from html.parser import HTMLParser
          with open('index.html', 'r', encoding='utf-8') as f:
              HTMLParser().feed(f.read())
              print('✓ HTML is valid')
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./

  notify:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()
    steps:
      - name: Success notification
        if: success()
        run: echo "✅ JobGuard AI deployed at https://Santhakumarramesh.github.io/jobguard-ai"
